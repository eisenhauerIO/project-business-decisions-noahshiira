name: replication-smart-green-nudging
channels:
  - conda-forge
  - defaults
dependencies:
  # Core scientific packages
  - python>=3.11,<3.14
  - numpy>=2.0
  - pandas>=2.0
  - matplotlib>=3.9
  - seaborn>=0.13
  - scipy>=1.12          # loosened from 1.14 — safer for mirror compatibility
  - statsmodels>=0.14
  # ML
  - scikit-learn>=1.3    # added — required by econml
  # Development tools
  - jupyterlab
  - ipykernel
  - nbconvert
  - pytest
  - ruff
  - pre-commit
  - pip
  - pip:
      - nbmake
      - econml>=0.15     # pip-only; not on conda-forge
